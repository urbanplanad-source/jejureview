<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeju Review — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1a1a2e;min-height:100vh}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh}
.gate-box{background:#fff;border-radius:20px;padding:40px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
.gate-box h1{font-size:20px;font-weight:800;margin-bottom:6px}
.gate-box p{font-size:13px;color:#9ca3af;margin-bottom:24px}
.gate-box input{width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none}
.gate-box input:focus{border-color:#3b82f6}
.gate-box button{width:100%;padding:13px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.gate-err{color:#ef4444;font-size:13px;margin-top:8px;display:none}
#app{display:none;max-width:860px;margin:0 auto;padding:24px 16px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.top-bar h1{font-size:20px;font-weight:800}
.top-bar a{font-size:13px;color:#3b82f6;text-decoration:none}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.card h2{font-size:14px;font-weight:700;color:#6177a5;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:#6177a5;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:#3b82f6}
.field textarea{resize:vertical;min-height:160px;font-family:'Courier New',monospace;font-size:13px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lang-tabs{display:flex;gap:6px;margin-bottom:16px}
.lang-tab{padding:7px 16px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:700;color:#9ca3af;cursor:pointer}
.lang-tab.active{background:#eff6ff;border-color:#3b82f6;color:#3b82f6}
.lang-panel{display:none}
.lang-panel.active{display:block}
.toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.tb-btn{padding:4px 9px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#374151}
.tb-btn:hover{background:#f3f4f6}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.btn-primary{padding:13px 28px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.btn-secondary{padding:13px 28px;background:#fff;color:#374151;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.btn-copy{padding:13px 28px;background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.preview-wrap{margin-top:20px;border:1.5px solid #e5e7eb;border-radius:12px;overflow:hidden;display:none}
.preview-wrap.open{display:block}
.preview-bar{background:#f8f9fc;padding:10px 16px;font-size:13px;font-weight:700;color:#6177a5;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between}
#preview-frame{width:100%;height:600px;border:none}
.tip{font-size:12px;color:#9ca3af;margin-top:5px;line-height:1.5}
</style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div class="gate-box">
    <h1>🏥 Jeju Review</h1>
    <p>관리자 페이지</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">로그인</button>
    <div class="gate-err" id="pw-err">비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="top-bar">
    <h1>📝 새 가이드 글 작성</h1>
    <a href="/">← 앱으로 돌아가기</a>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <h2>기본 정보</h2>
    <div class="row2">
      <div class="field">
        <label>슬러그 (URL용 영문, 하이픈 사용)</label>
        <input type="text" id="f-slug" placeholder="jeju-botox-guide">
        <div class="tip">예: jeju-botox-guide → /guide/jeju-botox-guide/</div>
      </div>
      <div class="field">
        <label>발행일</label>
        <input type="date" id="f-date">
      </div>
    </div>
    <div class="field">
      <label>썸네일 이미지 URL</label>
      <input type="url" id="f-thumb" placeholder="https://...">
      <div class="tip">이미지를 GitHub images/ 폴더에 업로드 후 상대경로 또는 절대 URL 입력</div>
    </div>
  </div>

  <!-- 언어별 내용 -->
  <div class="card">
    <h2>언어별 내용</h2>
    <div class="lang-tabs">
      <button class="lang-tab active" onclick="switchLang('en',this)">🇬🇧 English</button>
      <button class="lang-tab" onclick="switchLang('zh',this)">🇨🇳 中文</button>
      <button class="lang-tab" onclick="switchLang('ja',this)">🇯🇵 日本語</button>
    </div>

    <!-- EN -->
    <div class="lang-panel active" id="panel-en">
      <div class="field"><label>카테고리</label><input id="cat-en" placeholder="Clinic Guide / Treatment Guide / Research Tips"></div>
      <div class="field"><label>제목</label><input id="title-en" placeholder="영문 제목"></div>
      <div class="field"><label>요약 (검색결과에 표시되는 설명, 120자 내외)</label><textarea id="excerpt-en" style="min-height:70px" placeholder="영문 요약"></textarea></div>
      <div class="field">
        <label>본문 HTML</label>
        <div class="toolbar">
          <button class="tb-btn" onclick="ins('en','<h2>',  '</h2>')">H2</button>
          <button class="tb-btn" onclick="ins('en','<p>',    '</p>')">P</button>
          <button class="tb-btn" onclick="ins('en','<strong>','</strong>')"><b>B</b></button>
          <button class="tb-btn" onclick="ins('en','<em>',   '</em>')"><i>I</i></button>
          <button class="tb-btn" onclick="insImg('en')">IMG</button>
          <button class="tb-btn" onclick="ins('en','<ul>\n  <li>','</li>\n</ul>')">UL</button>
          <button class="tb-btn" onclick="ins('en','<li>','</li>')">LI</button>
        </div>
        <textarea id="body-en" placeholder="<h2>Section Title</h2>&#10;<p>Content here...</p>"></textarea>
      </div>
    </div>

    <!-- ZH -->
    <div class="lang-panel" id="panel-zh">
      <div class="field"><label>카테고리</label><input id="cat-zh" placeholder="选择指南 / 施术解读 / 信息技巧"></div>
      <div class="field"><label>제목</label><input id="title-zh" placeholder="中文标题"></div>
      <div class="field"><label>요약</label><textarea id="excerpt-zh" style="min-height:70px" placeholder="中文摘要"></textarea></div>
      <div class="field">
        <label>본문 HTML</label>
        <div class="toolbar">
          <button class="tb-btn" onclick="ins('zh','<h2>',  '</h2>')">H2</button>
          <button class="tb-btn" onclick="ins('zh','<p>',    '</p>')">P</button>
          <button class="tb-btn" onclick="ins('zh','<strong>','</strong>')"><b>B</b></button>
          <button class="tb-btn" onclick="ins('zh','<em>',   '</em>')"><i>I</i></button>
          <button class="tb-btn" onclick="insImg('zh')">IMG</button>
          <button class="tb-btn" onclick="ins('zh','<ul>\n  <li>','</li>\n</ul>')">UL</button>
          <button class="tb-btn" onclick="ins('zh','<li>','</li>')">LI</button>
        </div>
        <textarea id="body-zh" placeholder="<h2>章节标题</h2>&#10;<p>内容...</p>"></textarea>
      </div>
    </div>

    <!-- JA -->
    <div class="lang-panel" id="panel-ja">
      <div class="field"><label>카테고리</label><input id="cat-ja" placeholder="選び方ガイド / 施術ガイド / 調べ方のコツ"></div>
      <div class="field"><label>제목</label><input id="title-ja" placeholder="日本語タイトル"></div>
      <div class="field"><label>요약</label><textarea id="excerpt-ja" style="min-height:70px" placeholder="日本語の要約"></textarea></div>
      <div class="field">
        <label>본문 HTML</label>
        <div class="toolbar">
          <button class="tb-btn" onclick="ins('ja','<h2>',  '</h2>')">H2</button>
          <button class="tb-btn" onclick="ins('ja','<p>',    '</p>')">P</button>
          <button class="tb-btn" onclick="ins('ja','<strong>','</strong>')"><b>B</b></button>
          <button class="tb-btn" onclick="ins('ja','<em>',   '</em>')"><i>I</i></button>
          <button class="tb-btn" onclick="insImg('ja')">IMG</button>
          <button class="tb-btn" onclick="ins('ja','<ul>\n  <li>','</li>\n</ul>')">UL</button>
          <button class="tb-btn" onclick="ins('ja','<li>','</li>')">LI</button>
        </div>
        <textarea id="body-ja" placeholder="<h2>セクションタイトル</h2>&#10;<p>内容...</p>"></textarea>
      </div>
    </div>
  </div>

  <!-- 액션 버튼 -->
  <div class="actions">
    <button class="btn-primary" onclick="downloadHTML()">⬇ HTML 파일 다운로드</button>
    <button class="btn-copy" onclick="copyDataEntry()">📋 data.js 항목 복사</button>
    <button class="btn-secondary" onclick="togglePreview()">👁 미리보기</button>
  </div>

  <!-- 미리보기 -->
  <div class="preview-wrap" id="preview-wrap">
    <div class="preview-bar">
      <span>미리보기 (English)</span>
      <button class="tb-btn" onclick="togglePreview()">닫기</button>
    </div>
    <iframe id="preview-frame"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 비밀번호 ──────────────────────────────────────────────
// 비밀번호를 변경하려면 아래 ADMIN_PW 값을 수정하세요
const ADMIN_PW = "jejureview2026";

function checkPw(){
  const v = document.getElementById('pw-input').value;
  if(v === ADMIN_PW){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
}

// ── 언어 탭 전환 ──────────────────────────────────────────
function switchLang(lang, btn){
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.lang-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+lang).classList.add('active');
}

// ── 툴바: 커서 위치에 태그 삽입 ──────────────────────────
function ins(lang, open, close){
  const ta = document.getElementById('body-'+lang);
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  const rep = open + sel + close;
  ta.value = ta.value.substring(0,s) + rep + ta.value.substring(e);
  ta.selectionStart = ta.selectionEnd = s + open.length + sel.length + close.length;
  ta.focus();
}

function insImg(lang){
  const url = prompt('이미지 URL을 입력하세요:', 'images/');
  if(!url) return;
  const alt = prompt('이미지 설명(alt):', '') || '';
  const tag = '<img src="'+url+'" alt="'+alt+'" style="width:100%;border-radius:12px;margin:12px 0;">';
  const ta = document.getElementById('body-'+lang);
  const pos = ta.selectionStart;
  ta.value = ta.value.substring(0,pos) + '\n'+tag+'\n' + ta.value.substring(pos);
  ta.focus();
}

// ── 데이터 수집 ───────────────────────────────────────────
function getData(){
  return {
    slug:      document.getElementById('f-slug').value.trim().replace(/\s+/g,'-').toLowerCase(),
    date:      document.getElementById('f-date').value,
    thumb:     document.getElementById('f-thumb').value.trim(),
    cat:   {en:v('cat-en'),   zh:v('cat-zh'),   ja:v('cat-ja')},
    title: {en:v('title-en'), zh:v('title-zh'), ja:v('title-ja')},
    exc:   {en:v('excerpt-en'),zh:v('excerpt-zh'),ja:v('excerpt-ja')},
    body:  {en:v('body-en'),  zh:v('body-zh'),  ja:v('body-ja')}
  };
}
function v(id){ return document.getElementById(id).value.trim(); }

// ── HTML 생성 ─────────────────────────────────────────────
function generateHTML(d){
  function esc(s){ return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$\{/g,'\\${'); }
  const css = `*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:#f8f9fc;color:#1a1a2e;-webkit-font-smoothing:antialiased;padding-bottom:72px}a{color:inherit;text-decoration:none}.app-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.back-link{font-size:14px;font-weight:700;color:#3b82f6;display:flex;align-items:center;gap:4px;white-space:nowrap}.lang-tabs{display:flex;gap:4px;flex-shrink:0}.lang-tab{border:none;background:none;font-size:13px;font-weight:700;color:#9ca3af;padding:5px 9px;border-radius:8px;cursor:pointer;transition:all .15s}.lang-tab.active{background:#eff6ff;color:#3b82f6}.container{max-width:720px;margin:0 auto}.breadcrumb{font-size:12px;color:#9ca3af;padding:10px 16px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}.breadcrumb a{color:#9ca3af}.breadcrumb span{color:#c7c7cc}.article-header{padding:16px 16px 0}.cat-badge{display:inline-block;font-size:11px;font-weight:700;color:#3b82f6;background:rgba(59,130,246,.1);padding:3px 10px;border-radius:999px;margin-bottom:12px}h1{font-size:22px;font-weight:800;line-height:1.35;letter-spacing:-.02em;color:#1a1a2e}.article-meta{font-size:13px;color:#9ca3af;margin-top:8px;font-weight:600}.hero-img{width:100%;display:block;margin:16px 0 0;max-height:280px;object-fit:cover}.article-body{padding:20px 16px 8px;font-size:16px;line-height:1.8;color:#374151}.article-body h2{font-size:17px;font-weight:800;color:#1a1a2e;margin:24px 0 8px;letter-spacing:-.02em;padding-left:10px;border-left:3px solid #3b82f6}.article-body p{margin:0 0 14px}.article-body p:last-child{margin-bottom:0}.article-body img{width:100%;border-radius:12px;margin:12px 0;display:block}.article-body strong{color:#1a1a2e;font-weight:700}.article-body ul{margin:0 0 14px 20px}.article-body li{margin-bottom:6px;line-height:1.7}.cta-box{margin:28px 16px 20px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:20px;padding:24px;text-align:center}.cta-title{font-size:17px;font-weight:800;color:#1a1a2e;margin-bottom:6px}.cta-sub{font-size:13px;color:#6177a5;margin-bottom:18px;line-height:1.5}.cta-btn{display:inline-block;background:#3b82f6;color:#fff;font-size:15px;font-weight:700;padding:13px 28px;border-radius:14px;box-shadow:0 4px 14px rgba(59,130,246,.3)}footer{padding:20px 16px;text-align:center;font-size:12px;color:#9ca3af;border-top:1px solid rgba(0,0,0,.06)}footer a{color:#9ca3af;text-decoration:underline}.bottom-banner{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.15)}.bottom-banner-text{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bottom-banner-btn{background:#3b82f6;color:#fff;font-size:13px;font-weight:700;padding:8px 16px;border-radius:8px;white-space:nowrap;flex-shrink:0}.bottom-banner-close{background:none;border:none;color:#9ca3af;font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}@media(min-width:720px){.hero-img{border-radius:0 0 16px 16px}.article-body{padding:24px 24px 8px}.article-header{padding:20px 24px 0}.cta-box{margin:28px 24px 20px}.breadcrumb{padding:12px 24px}}`;

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${d.title.en} | Jeju Review</title>
<meta name="description" id="meta-desc" content="${d.exc.en}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="Jeju Review">
<meta property="og:title" id="og-title" content="${d.title.en} | Jeju Review">

<meta property="og:url" id="og-url" content="">

<link rel="canonical" id="canonical" href="">
<script type="application/ld+json" id="jsonld"><\/script>
<style>${css}<\/style>
</head>
<body>
<div class="app-bar">
  <a href="/" class="back-link">← Jeju Review</a>
  <div class="lang-tabs">
    <button class="lang-tab" data-lang="en">EN</button>
    <button class="lang-tab" data-lang="zh">中</button>
    <button class="lang-tab" data-lang="ja">日</button>
  </div>
</div>
<div class="container">
  <nav class="breadcrumb">
    <a href="/">Jeju Review</a><span>›</span>
    <a href="/?p=contents" id="bc-guide">Guide</a><span>›</span>
    <span id="bc-title">${d.title.en}</span>
  </nav>
  <div class="article-header">
    <span class="cat-badge" id="cat-badge">${d.cat.en}</span>
    <h1 id="art-title">${d.title.en}</h1>
    <div class="article-meta"><time id="art-date" datetime="${d.date}">${d.date}</time></div>
  </div>
  <img id="hero-img" class="hero-img" src="${d.thumb}" alt="${d.title.en}" loading="eager">
  <div id="art-body" class="article-body">${d.body.en}</div>
  <div class="cta-box">
    <div class="cta-title" id="cta-title">Looking for clinics in Jeju?</div>
    <div class="cta-sub" id="cta-sub">Browse hospitals, compare reviews, and get directions — all in one app.</div>
    <a href="/" class="cta-btn" id="cta-btn">Open Jeju Review →</a>
  </div>
  <footer>
    <a href="/">Jeju Review</a> &nbsp;·&nbsp;
    <a href="/privacy.html" id="footer-privacy">Privacy Policy</a>
  </footer>
</div>
<div class="bottom-banner" id="bottom-banner">
  <span class="bottom-banner-text" id="banner-text">🏥 Find the best clinics in Jeju</span>
  <a href="/" class="bottom-banner-btn" id="banner-btn">Open App</a>
  <button class="bottom-banner-close" onclick="document.getElementById('bottom-banner').style.display='none'">×</button>
</div>
<script>
const THUMBNAIL="${d.thumb}";
const PUBLISHED="${d.date}";
const SLUG="${d.slug}";
const C={
  en:{cat:\`${esc(d.cat.en)}\`,title:\`${esc(d.title.en)}\`,excerpt:\`${esc(d.exc.en)}\`,body:\`${esc(d.body.en)}\`},
  zh:{cat:\`${esc(d.cat.zh)}\`,title:\`${esc(d.title.zh)}\`,excerpt:\`${esc(d.exc.zh)}\`,body:\`${esc(d.body.zh)}\`},
  ja:{cat:\`${esc(d.cat.ja)}\`,title:\`${esc(d.title.ja)}\`,excerpt:\`${esc(d.exc.ja)}\`,body:\`${esc(d.body.ja)}\`}
};
const UI={
  en:{cta_title:"Looking for clinics in Jeju?",cta_sub:"Browse hospitals, compare reviews, and get directions — all in one app.",cta_btn:"Open Jeju Review →",banner:"🏥 Find the best clinics in Jeju",banner_btn:"Open App",privacy:"Privacy Policy",bc_guide:"Guide"},
  zh:{cta_title:"在寻找济州的诊所？",cta_sub:"浏览医院、比较评论、查找路线，一个App全搞定。",cta_btn:"打开济州Review →",banner:"🏥 在济州寻找优质诊所",banner_btn:"打开App",privacy:"隐私政策",bc_guide:"攻略"},
  ja:{cta_title:"済州のクリニックをお探しですか？",cta_sub:"病院を探して、口コミを比較して、アクセスを確認。すべてひとつのアプリで。",cta_btn:"Jeju Reviewを開く →",banner:"🏥 済州の優良クリニックを探す",banner_btn:"アプリを開く",privacy:"プライバシーポリシー",bc_guide:"ガイド"}
};
function setLang(lang){
  const c=C[lang],u=UI[lang];
  document.documentElement.lang=lang==='zh'?'zh-CN':lang;
  document.title=c.title+' | Jeju Review';
  document.getElementById('meta-desc').content=c.excerpt;
  document.getElementById('og-title').content=c.title+' | Jeju Review';
  document.getElementById('og-desc').content=c.excerpt;
  document.getElementById('cat-badge').textContent=c.cat;
  document.getElementById('art-title').textContent=c.title;
  document.getElementById('art-body').innerHTML=c.body;
  document.getElementById('bc-title').textContent=c.title;
  document.getElementById('bc-guide').textContent=u.bc_guide;
  document.getElementById('cta-title').textContent=u.cta_title;
  document.getElementById('cta-sub').textContent=u.cta_sub;
  document.getElementById('cta-btn').textContent=u.cta_btn;
  document.getElementById('banner-text').textContent=u.banner;
  document.getElementById('banner-btn').textContent=u.banner_btn;
  document.getElementById('footer-privacy').textContent=u.privacy;
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  const url=new URL(location.href);url.searchParams.set('lang',lang);history.replaceState(null,'',url);
  localStorage.setItem('jejureview_lang',lang);
}
const cu=location.origin+'/guide/'+SLUG+'/';
document.getElementById('canonical').href=cu;document.getElementById('og-url').content=cu;
document.getElementById('jsonld').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":C.en.title,"description":C.en.excerpt,"image":THUMBNAIL,"datePublished":PUBLISHED,"url":cu,"author":{"@type":"Organization","name":"Jeju Review","url":location.origin},"publisher":{"@type":"Organization","name":"Jeju Review","url":location.origin}});
['en','zh','ja'].forEach(l=>{const lk=document.createElement('link');lk.rel='alternate';lk.hreflang=l==='zh'?'zh-CN':l;lk.href=cu+'?lang='+l;document.head.appendChild(lk);});
const xd=document.createElement('link');xd.rel='alternate';xd.hreflang='x-default';xd.href=cu;document.head.appendChild(xd);
document.querySelectorAll('.lang-tab').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

const sl=localStorage.getItem('jejureview_lang');
const nl=(navigator.language||'en').toLowerCase();
const dt=ul||sl||(nl.startsWith('zh')?'zh':nl.startsWith('ja')?'ja':'en');
setLang(['en','zh','ja'].includes(dt)?dt:'en');
<\/script>
</body>
</html>`;
}

// ── data.js 항목 생성 ─────────────────────────────────────
function generateDataEntry(d){
  function q(s){ return s.replace(/`/g,'\\`'); }
  return `    {
      id:"c-NEW",
      slug:"${d.slug}",
      category:{ zh:"${d.cat.zh}", en:"${d.cat.en}", ja:"${d.cat.ja}" },
      thumbnail:"${d.thumb}",
      excerpt:{
        zh:"${d.exc.zh}",
        en:"${d.exc.en}",
        ja:"${d.exc.ja}"
      },
      title:{
        zh:"${d.title.zh}",
        en:"${d.title.en}",
        ja:"${d.title.ja}"
      },
      published_at:"${d.date}",
      body:{
        zh:\`${q(d.body.zh)}\`,
        en:\`${q(d.body.en)}\`,
        ja:\`${q(d.body.ja)}\`
      }
    }`;
}

// ── 다운로드 ──────────────────────────────────────────────
function downloadHTML(){
  const d = getData();
  if(!d.slug){ alert('슬러그를 입력하세요.'); return; }
  if(!d.title.en){ alert('영문 제목을 입력하세요.'); return; }
  const html = generateHTML(d);
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  showToast('HTML 파일 다운로드 완료! guide/' + d.slug + '/ 폴더에 업로드하세요.');
}

// ── 클립보드 복사 ─────────────────────────────────────────
function copyDataEntry(){
  const d = getData();
  if(!d.slug){ alert('슬러그를 입력하세요.'); return; }
  const entry = generateDataEntry(d);
  navigator.clipboard.writeText(entry).then(()=>{
    showToast('data.js 항목이 클립보드에 복사되었습니다.');
  });
}

// ── 미리보기 ──────────────────────────────────────────────
function togglePreview(){
  const wrap = document.getElementById('preview-wrap');
  if(wrap.classList.contains('open')){
    wrap.classList.remove('open');
    return;
  }
  const d = getData();
  const html = generateHTML(d);
  const frame = document.getElementById('preview-frame');
  frame.srcdoc = html;
  wrap.classList.add('open');
}

// ── 토스트 ────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
