<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;background:#f6f6f8;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","PingFang SC","Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;color:#1a1a2e;-webkit-font-smoothing:antialiased;}
input,button,textarea{font-family:inherit;}
::-webkit-scrollbar{display:none;}
button{cursor:pointer;border:none;background:none;padding:0;}

/* ── LAYOUT ── */
/* #pc-wrapper는 단순 컨테이너 — flex 없음 (앱은 margin:auto로 중앙 정렬 유지) */
#pc-wrapper{min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:#f6f6f8;position:relative;box-shadow:0 0 60px rgba(0,0,0,.08);}

/* PC 광고: 기본 숨김, PC에서만 fixed 좌측 중앙 표시 */
#pc-ad{display:none;}
@media(min-width:900px){
  #pc-ad{
    display:block;
    position:fixed;
    /* 앱 왼쪽 가장자리(= 50vw - 215px)에서 20px 간격 두고 왼쪽에 배치 */
    left:calc(50vw - 215px - 20px - 200px); /* = calc(50vw - 435px) */
    width:200px;
    top:50%;
    transform:translateY(-50%);
    z-index:40;
  }
}
/* ── 프로모션 카드 (PC 좌측 광고, 모두닥 스타일) ── */
.pc-ad-img{width:100%;border-radius:14px;display:block;box-shadow:0 4px 20px rgba(0,0,0,.12);}
.safe-area{padding-bottom:calc(68px + env(safe-area-inset-bottom));min-height:100vh;}
.page-pad{padding:0 16px;}


/* ── BOTTOM TAB ── */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom);display:flex;z-index:50;}
.tab-btn{flex:1;border:none;background:none;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#9ca3af;transition:color .15s;}
.tab-btn.active{color:#3b82f6;}
.tab-btn span{font-size:10px;font-weight:500;}
.tab-btn.active span{font-weight:700;}
.tab-btn svg{display:block;}

/* ── PAGE HEADER ── */
.page-header{position:sticky;top:0;z-index:40;background:rgba(246,246,248,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.page-header-back{border:none;background:none;padding:4px;display:flex;color:#3b82f6;cursor:pointer;}
.page-header-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── CARDS ── */
.card{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.06);box-shadow:0 2px 12px rgba(0,0,0,.06);padding:16px;}
.card-sm{padding:14px;}
.card+.card,.card+.section-wrap{margin-top:12px;}

/* ── HERO ── */
.hero{padding:28px 0 8px;text-align:center;}
.hero-icon{width:56px;height:56px;margin:0 auto 12px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 24px rgba(59,130,246,.25);}
.hero h1{font-size:22px;font-weight:800;letter-spacing:-.03em;}
.hero p{margin:8px auto 0;color:#7c7c8a;font-size:13px;line-height:1.55;max-width:300px;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0;}
.stat-card{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.06);box-shadow:0 2px 12px rgba(0,0,0,.06);padding:14px 8px;text-align:center;}
.stat-num{font-size:22px;font-weight:800;}
.stat-label{font-size:11px;color:#7c7c8a;margin-top:2px;font-weight:600;}

/* ── SECTION HEADER ── */
.section-header{display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px;}
.section-title{font-size:18px;font-weight:750;}
.btn-more{background:rgba(59,130,246,.08);color:#3b82f6;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:650;}

/* ── HOSPITAL CARD ── */
.hosp-card{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.06);box-shadow:0 2px 12px rgba(0,0,0,.06);padding:14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s;}
.hosp-card:active{transform:scale(.98);}
.hosp-avatar{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#e0e7ff 0%,#f0f0ff 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;border:1px solid rgba(0,0,0,.06);}
.hosp-thumb{width:52px;height:52px;border-radius:14px;overflow:hidden;flex-shrink:0;background:#e8e8f0;border:1px solid rgba(0,0,0,.06);position:relative;display:flex;align-items:center;justify-content:center;}
.hosp-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.hosp-thumb-fallback{position:absolute;font-size:22px;color:#7c7c8a;}
/* ── DETAIL IMAGE GALLERY ── */
.detail-images{display:flex;gap:8px;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;}
.detail-images::-webkit-scrollbar{display:none;}
.detail-img-item{flex-shrink:0;width:calc(50% - 4px);aspect-ratio:4/3;border-radius:14px;overflow:hidden;background:#e8e8f0;scroll-snap-align:start;}
.detail-img-item img{width:100%;height:100%;object-fit:cover;display:block;}
.detail-img-empty{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#f0f0f8,#e8e8f0);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#c0c0cc;}
.hosp-info{flex:1;min-width:0;margin-left:0;}
.hosp-name-ko{font-size:16px;font-weight:700;letter-spacing:-.01em;}
.hosp-name-sub{font-size:13px;color:#7c7c8a;margin-top:2px;}
.hosp-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.hosp-chevron{color:#c7c7cc;flex-shrink:0;margin-left:4px;}
.badge-foreign{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:999px;background:rgba(245,158,11,.1);color:#d97706;font-size:11px;font-weight:700;}

/* ── SPECIALTY GRID (똑닥 스타일) ── */
.spec-section{margin:20px 0 4px;}
.spec-section-title{font-size:15px;font-weight:700;margin-bottom:12px;letter-spacing:-.02em;}
.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.spec-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.spec-item:active .spec-icon{transform:scale(.93);}
.spec-icon{width:64px;height:64px;border-radius:20px;background:#fff;border:1px solid rgba(0,0,0,.07);box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform .15s;}
/* 블루 모노크롬 계열로 통일 — 이모지가 구분자 역할 */
.spec-icon.beauty   {background:rgba(59,130,246,.10);}
.spec-icon.dental   {background:rgba(59,130,246,.10);}
.spec-icon.eye      {background:rgba(59,130,246,.10);}
.spec-icon.ent      {background:rgba(59,130,246,.10);}
.spec-icon.internal {background:rgba(59,130,246,.10);}
.spec-icon.neuro    {background:rgba(59,130,246,.10);}
.spec-icon.ortho    {background:rgba(59,130,246,.10);}
.spec-icon.pediatric{background:rgba(59,130,246,.10);}
.spec-label{font-size:12px;font-weight:600;color:#374151;text-align:center;line-height:1.3;}
/* ── POPULAR PROCEDURES ── */
.proc-section{margin:20px 0 0;}
.proc-section-title{font-size:15px;font-weight:700;margin-bottom:10px;letter-spacing:-.02em;}
.proc-card{display:flex;align-items:center;gap:14px;background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);border:1px solid rgba(0,0,0,.06);cursor:pointer;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent;}
.proc-card:active{transform:scale(.98);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.proc-card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.proc-card-icon.lifting  {background:rgba(59,130,246,.10);}
.proc-card-icon.botox    {background:rgba(59,130,246,.10);}
.proc-card-icon.booster  {background:rgba(59,130,246,.10);}
.proc-card-body{flex:1;min-width:0;}
.proc-card-name{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:3px;}
.proc-card-sub{font-size:12px;color:#6b7280;line-height:1.4;}
.proc-card-arrow{color:#d1d5db;font-size:18px;flex-shrink:0;}

/* ── BOOKING CHAT UI ── */
.booking-wrap{display:flex;flex-direction:column;height:calc(100vh - 68px - env(safe-area-inset-bottom));}
.booking-header{padding:16px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0;}
.booking-header-title{font-size:17px;font-weight:800;}
.booking-header-sub{font-size:12px;color:#7c7c8a;margin-top:2px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#f6f6f8;}
.chat-bubble{max-width:80%;padding:12px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;}
.chat-bubble.ai{background:#fff;color:#1a1a2e;border-radius:4px 18px 18px 18px;border:1px solid rgba(0,0,0,.06);align-self:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.chat-bubble.user{background:#3b82f6;color:#fff;border-radius:18px 4px 18px 18px;align-self:flex-end;}
.chat-bubble.ai .ai-name{font-size:11px;color:#7c7c8a;font-weight:700;margin-bottom:5px;}
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:4px 16px 8px;background:#f6f6f8;}
.qr-btn{padding:8px 14px;border-radius:20px;background:#fff;border:1.5px solid #3b82f6;color:#3b82f6;font-size:13px;font-weight:650;cursor:pointer;transition:all .15s;white-space:nowrap;}
.qr-btn:active{background:#3b82f6;color:#fff;transform:scale(.97);}
.chat-input-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-top:1px solid rgba(0,0,0,.06);flex-shrink:0;padding-bottom:calc(10px + env(safe-area-inset-bottom));}
.chat-input{flex:1;padding:10px 14px;border-radius:22px;border:1.5px solid #e5e7eb;font-size:14px;outline:none;background:#f9fafb;transition:border-color .15s;}
.chat-input:focus{border-color:#3b82f6;}
.chat-send-btn{width:40px;height:40px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:transform .15s;}
.chat-send-btn:active{transform:scale(.92);}
.chat-send-btn:disabled{background:#d1d5db;cursor:default;}
/* booking 탭 — 병원 목록 카드 */
.booking-clinic-card{background:#fff;border-radius:14px;border:1px solid rgba(0,0,0,.07);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-top:8px;cursor:pointer;}
.booking-clinic-card:active{background:#f5f5f7;}
.booking-clinic-thumb{width:48px;height:48px;border-radius:12px;object-fit:cover;background:#e0e7ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.booking-clinic-info{flex:1;min-width:0;}
.booking-clinic-name{font-size:14px;font-weight:700;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.booking-clinic-meta{font-size:12px;color:#7c7c8a;margin-top:2px;}
.booking-clinic-arrow{color:#c7c7cc;font-size:16px;flex-shrink:0;}

/* ── BADGES & CHIPS ── */
.badge{display:inline-block;padding:4px 10px;border-radius:999px;background:rgba(59,130,246,.08);color:#3b82f6;font-size:12px;font-weight:650;}
.badge-green{background:rgba(16,185,129,.1);color:#10b981;}
.badge-orange{background:rgba(245,158,11,.1);color:#f59e0b;}
.badge-accent{background:rgba(59,130,246,.15);color:#3b82f6;}
.stars{display:flex;align-items:center;gap:2px;}
.star{font-size:14px;}
.star.on{color:#f59e0b;}
.star.off{color:#d1d5db;}
.rating-num{margin-left:4px;font-size:14px;font-weight:700;color:#1a1a2e;}
.review-count{font-size:11px;color:#9ca3af;}

.chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;border:1px solid rgba(0,0,0,.06);background:transparent;color:#7c7c8a;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s;cursor:pointer;}
.chip.active{border-width:1.5px;}
.chips-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.chips-row::-webkit-scrollbar{display:none;}

.kw-tag{padding:4px 10px;border-radius:999px;background:#f3f4f6;font-size:12px;color:#7c7c8a;font-weight:600;}

/* ── CONTENT CAROUSEL ── */
.content-carousel{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory;}
.content-carousel::-webkit-scrollbar{display:none;}
.content-card{flex:0 0 75%;max-width:280px;scroll-snap-align:start;background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.06);box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;cursor:pointer;}
.content-thumb{height:120px;background:linear-gradient(135deg,#e0e7ff 0%,#f5f3ff 100%);display:flex;align-items:center;justify-content:center;font-size:32px;color:#818cf8;}
.content-body{padding:12px 14px 14px;}
.content-title{font-size:14px;font-weight:700;line-height:1.4;}
.content-date{font-size:12px;color:#7c7c8a;margin-top:4px;}

/* ── CONTENT LIST ITEM (게시판형) ── */
.content-list-item{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.06);box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;cursor:pointer;display:flex;flex-direction:row;align-items:stretch;min-height:90px;}
.content-list-thumb{width:96px;flex-shrink:0;background:linear-gradient(135deg,#e0e7ff,#f5f3ff);overflow:hidden;}
.content-list-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.content-list-body{flex:1;min-width:0;padding:11px 13px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
.content-list-cat{font-size:11px;font-weight:700;color:#3b82f6;letter-spacing:.02em;}
.content-list-title{font-size:14px;font-weight:700;line-height:1.4;color:#1a1a2e;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.content-list-excerpt{font-size:12px;color:#6b7280;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.content-list-meta{font-size:11px;color:#9ca3af;margin-top:2px;}

/* ── INFO BOXES ── */
.info-box{border-radius:10px;padding:14px;margin-bottom:10px;}
.info-box-title{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;margin-bottom:8px;}
.info-box-item{font-size:13px;line-height:1.6;padding-left:8px;border-left-width:2px;border-left-style:solid;margin-bottom:6px;}
.info-box.green{background:rgba(16,185,129,.1);}
.info-box.green .info-box-title{color:#065f46;}
.info-box.green .info-box-item{color:#064e3b;border-left-color:#10b981;}
.info-box.orange{background:rgba(245,158,11,.1);}
.info-box.orange .info-box-title{color:#92400e;}
.info-box.orange .info-box-item{color:#78350f;border-left-color:#f59e0b;}
.info-box.red{background:rgba(239,68,68,.08);}
.info-box.red .info-box-title{color:#991b1b;}
.info-box.red .info-box-item{color:#7f1d1d;border-left-color:#ef4444;}

/* ── DISCLAIMER ── */
.disclaimer{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.15);border-radius:16px;padding:14px;margin:24px 0 20px;display:flex;gap:10px;align-items:flex-start;}
.disclaimer-title{font-size:13px;font-weight:700;color:#92400e;}
.disclaimer-body{font-size:12px;color:#a16207;margin-top:4px;line-height:1.55;}

/* ── HOSPITAL DETAIL ── */
.hosp-detail-top{display:flex;gap:14px;align-items:center;}
.hosp-detail-avatar{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#e0e7ff,#f0f0ff);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid rgba(0,0,0,.06);flex-shrink:0;}
.hosp-detail-info-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#7c7c8a;margin-top:8px;}
.specialties{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}

.platform-tabs{display:flex;gap:6px;margin-bottom:14px;}
.platform-meta{font-size:13px;color:#7c7c8a;margin-bottom:10px;font-weight:600;}
.platform-summary{font-size:14px;color:#1a1a2e;line-height:1.6;margin-bottom:14px;}
.keywords-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}

.ai-summary-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-summary-text{font-size:14px;color:#7c7c8a;line-height:1.65;}
.highlights{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}

/* ── CTA ── */
.cta-card{text-align:center;}
.cta-title{font-size:14px;font-weight:700;margin-bottom:10px;}
.cta-btns{display:flex;gap:10px;justify-content:center;}
.cta-btn-blue{flex:1;max-width:160px;padding:12px 0;border-radius:12px;border:none;background:#3b82f6;color:#fff;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 14px rgba(59,130,246,.3);}
.cta-btn-green{flex:1;max-width:160px;padding:12px 0;border-radius:12px;border:1.5px solid #07c160;background:#fff;color:#07c160;font-weight:700;font-size:14px;cursor:pointer;}
.cta-btn-line{flex:1;max-width:160px;padding:12px 0;border-radius:12px;border:1.5px solid #06c755;background:#fff;color:#06c755;font-weight:700;font-size:14px;cursor:pointer;}
.cta-btn-ig{flex:1;max-width:160px;padding:12px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#c13584,#833ab4);color:#fff;font-weight:700;font-size:14px;cursor:pointer;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin:12px 0;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#7c7c8a;pointer-events:none;}
.search-input{width:100%;padding:12px 38px 12px 38px;border-radius:12px;border:1px solid rgba(0,0,0,.06);background:#fff;font-size:15px;outline:none;color:#1a1a2e;box-sizing:border-box;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:#e5e7eb;width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:#6b7280;}

/* ── ME PAGE ── */

function stars(rating){
  const full=Math.floor(rating), half=rating-full>=0.5;
  return `<div class="stars">${[0,1,2,3,4].map(i=>`<span class="star ${(i<full||(i===full&&half))?'on':'off'}">★</span>`).join("")}<span class="rating-num">${rating}</span></div>`;
}
function badge(text, cls=""){return `<span class="badge ${cls}">${text}</span>`;}
function chip(text, active, color="#3b82f6", bg="rgba(59,130,246,.08)", dataKey=""){
  const style = active ? `style="border-color:${color};border-width:1.5px;background:${bg};color:${color};"` : "";
  return `<button class="chip${active?' active':''}" ${style} data-chip="${dataKey}">${text}</button>`;
}
function infoBox(type, iconHtml, titleColor, title, items){
  if(!items||!items.length) return "";
  return `<div class="info-box ${type}">
    <div class="info-box-title">${iconHtml}<span style="color:${titleColor}">${title}</span></div>
    ${items.map(t=>`<div class="info-box-item">${t}</div>`).join("")}
  </div>`;
}
function venueBadge(h){
  const type = h.type || "clinic";
  if(type==="skincare") return `<span class="badge-venue-skincare">✨ ${t('venue_skincare')}</span>`;
  if(type==="massage")  return `<span class="badge-venue-massage">💆 ${t('venue_massage')}</span>`;
  return "";
}
function normalizeHospitalData(){
  DB.hospitals = DB.hospitals
  .filter(h=>{
    const ko = h.name_ko || "";
    const en = (h.name && h.name.en) || "";
    return !(/와인피부과의원/.test(ko) || /wine dermatology/i.test(en));
  })
  .map(h=>{
    const normalized = {...h};
    if(
      normalized.name_ko==="벨륭성형외과의원" ||
      normalized.name_ko==="벨르e몽성형외과의원" ||
      normalized.name_ko==="벨르e?몽성형외과의원" ||
      /벨르.*성형외과의원/.test(normalized.name_ko)
    ){
      normalized.name_ko = "벨르몬성형외과의원";
    }
    if(!normalized.phone){
      normalized.phone = normalized.tel || normalized.telephone || normalized.contact_phone || "";
    }
    if(normalized.hours){
      normalized.hours = {
        ...normalized.hours,
        weekday: normalized.hours.weekday || normalized.hours.weekdays || normalized.hours.week || normalized.hours.mon_fri,
        sat: normalized.hours.sat || normalized.hours.saturday,
        closed: normalized.hours.closed || normalized.hours.holiday || normalized.hours.off
      };
    }
    return normalized;
  });
}

function navigate(page, id=null){
  navHistory.push({page:state.page, id:state.id, tab:state.tab});
  state.page = page;
  state.id = id;
  if(["home","hospitals","contents","me"].includes(page)) state.tab = page;
  else if(page==="hospital") state.tab = "hospitals";
  else if(page==="post") state.tab = "contents";
  else if(page==="privacy") state.tab = "me";
  window.scrollTo(0,0);
  render();
}
function goBack(){
  if(navHistory.length){
    const prev = navHistory.pop();
    state.page = prev.page;
    state.id = prev.id;
    state.tab = prev.tab;
    window.scrollTo(0,0);
    render();
  }
}
function switchTab(tab){
  navHistory = [];
  // booking 탭 재진입 시 시술 선택 초기화
  if(tab==="booking"){
    state.bookStep=0; state.bookData={}; state.bookMsgs=[];
    state.bookFormVisible=false;
  }
  state.page = tab;
  state.tab = tab;
  state.id = null;
  window.scrollTo(0,0);
  render();
}

function renderHospitals(){
  const lang = state.lang;
  const q  = state.hospSearch.toLowerCase().trim();
  const r  = state.hospRegion;
  const cn = state.hospChinese;
  const sp = state.hospSpecialty; // specialty 필터

  const regions = ["all",...new Set(DB.hospitals.map(h=>h.region))];

  // 현재 시간 (영업시간 체크용)
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const nowDay = now.getDay(); // 0=일,1=월..6=토

  function isOpenNow(h){
    if(!h.hours) return false;
    // hours 값은 다국어 객체 {zh,en,ja} → .en 문자열로 파싱
    let slotObj;
    if(nowDay===0){
      // 일요일: closed 필드에 "every day" 포함 시에만 영업
      const closedEn = (h.hours.closed && h.hours.closed.en) || "";
      if(!/every\s*day/i.test(closedEn)) return false;
      slotObj = h.hours.weekday;
    } else if(nowDay===6){
      slotObj = h.hours.sat;
    } else {
      slotObj = h.hours.weekday;
    }
    if(!slotObj) return false;
    const slotStr = typeof slotObj === "string" ? slotObj : (slotObj.en || "");
    // 시간 범위 추출: "10:00–19:00" or "10:00 - 19:00" 등
    const m = slotStr.match(/(\d{1,2}:\d{2})\s*[–\-~]\s*(\d{1,2}:\d{2})/);
    if(!m) return false;
    const toMin = s=>{const [hh,mm]=s.split(":").map(Number);return hh*60+(mm||0);};
    return nowMin >= toMin(m[1]) && nowMin < toMin(m[2]);
  }

  // 필터
  let filtered = DB.hospitals.filter(h=>{
    if(r!=="all" && h.region!==r) return false;
    if(cn && !h.chinese_staff) return false;
    if(q && !`${h.name_ko} ${lng(h.name)} ${lng(h.address)}`.toLowerCase().includes(q)) return false;
    // 기능 필터
    if(sp==="open_now")         { if(!isOpenNow(h)) return false; }
    else if(sp==="foreign_official"){ if(!h.foreign_official) return false; }
    else if(sp==="popular")     { /* 정렬로 처리, 필터 없음 */ }
    else if(sp==="derm_cert")   { if(h.specialist_cert!=="dermatology") return false; }
    else if(sp){
      // 일반 specialty 필터
      const specDef = SPECIALTIES.find(s=>s.key===sp);
      if(specDef && specDef.specialties && !specDef.specialties.includes(h.specialty)) return false;
    } else {
      // specialty 필터 없을 때: 비병원 업체(스킨케어샵·마사지샵)는 숨김
      if(h.type && h.type !== "clinic") return false;
    }
    return true;
  });

  // 정렬: popular 필터면 review_count 기준, 그 외엔 평점 기준 (중립 정렬)
  if(sp==="popular"){
    filtered = [...filtered].sort((a,b)=>(b.review_count||0)-(a.review_count||0));
  } else {
    filtered = [...filtered].sort((a,b)=>b.rating - a.rating);
  }

  const regionChips = regions.map(rk=>
    chip(reg(rk), r===rk, "#3b82f6", "rgba(59,130,246,.08)", `region:${rk}`)
  ).join("");
  const chineseChip = chip(`🗣️ ${t('hosp_chinese')}`, cn, "#07c160", "rgba(7,193,96,.1)", "chinese:toggle");
  const specChips = SPECIALTIES.map(s=>
    chip(t('spec_'+s.key), sp===s.key, "#8b5cf6", "rgba(139,92,246,.1)", `spec:${s.key}`)
  ).join("");
  const specAllChip = chip({zh:"全部",en:"All",ja:"すべて"}[lang], sp==="", "#3b82f6","rgba(59,130,246,.08)","spec:");

  const hospList = filtered.length===0
    ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">${t('hosp_empty')}</div></div>`
    : filtered.map(h=>hospCardHtml(h)).join("");

  return `<div class="safe-area page-enter">
    <div class="page-header">
      <span class="page-header-title">${t('tab_hospitals')}</span>
    </div>
    <div class="page-pad">
      <div class="search-wrap">
        <span class="search-icon">${IC.search()}</span>
        <input class="search-input" id="hospSearch" type="text" placeholder="${t('hosp_search_ph')}" value="${state.hospSearch}"/>
        ${state.hospSearch?`<button class="search-clear" id="clearSearch">✕</button>`:""}
      </div>
      <div class="chips-row" style="margin-bottom:8px">${specAllChip}${specChips}</div>
      <div class="chips-row" style="margin-bottom:16px">${regionChips}${chineseChip}</div>
      <div class="list-stack" style="padding-bottom:20px" id="hospList">${hospList}</div>
    </div>
  </div>`;
}

/* ── BOOKING (빠른예약) ── */
function getBookingMsgs(){
  // 초기 메시지가 없으면 초기화
  if(!state.bookMsgs || state.bookMsgs.length===0){
    const intro = t('booking_intro').replace(/\\n/g,"\n");
    state.bookMsgs = [
      {role:"ai", text: intro},
      {role:"ai", text: t('booking_ask_spec'), type:"spec_select"},
    ];
    state.bookStep = 1;
  }
  return state.bookMsgs;
}

function bookingSpecOptions(){
  // 기능 필터(open_now/foreign_official/popular)는 시술 카테고리가 아니므로 제외
  return SPECIALTIES.filter(sp=>!sp.isFilter).map(sp=>
    `<button class="qr-btn" data-bookspec="${sp.key}">${sp.icon} ${t('spec_'+sp.key)}</button>`
  ).join("");
}

function _escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function bookingMsgHtml(msgs){
  return msgs.map((m,i)=>{
    let bubble = `<div class="chat-bubble ${m.role}">`;
    if(m.role==="ai") bubble += `<div class="ai-name">🤖 AI Assistant</div>`;
    const safeText = m.role==="user" ? _escHtml(m.text) : m.text;
    bubble += safeText.replace(/\n/g,"<br>");
    bubble += `</div>`;
    // 마지막 ai 메시지가 spec_select 타입이면 quick reply 버튼 추가
    if(m.role==="ai" && m.type==="spec_select" && i===msgs.length-1 && !state.bookData.spec){
      bubble += `<div class="quick-replies">${bookingSpecOptions()}</div>`;
    }
    return bubble;
  }).join("");
}

function renderClinicListForSpec(){
  // 선택된 시술 카테고리에 해당하는 병원 목록 표시 (정보 제공 목적)
  const specKey = state.bookData.spec;
  if(!specKey) return "";
  const specDef = SPECIALTIES.find(s=>s.key===specKey);
  let matched = DB.hospitals.filter(h=>{
    if(!specDef || !specDef.specialties) return false;
    return specDef.specialties.includes(h.specialty);
  }).sort((a,b)=>b.rating - a.rating);
  if(!matched.length){
    const noResult = {zh:"暂无相关医院信息",en:"No clinics found for this category",ja:"該当するクリニックはありません"}[state.lang];
    return `<div class="chat-bubble ai"><div class="ai-name">🤖 AI Assistant</div>${noResult}</div>`;
  }
  const cards = matched.map(h=>{
    const thumb = h.images?.[0]
      ? `<img class="booking-clinic-thumb" src="${h.images[0]}" alt="${h.name_ko}" onerror="this.outerHTML='<div class=\\'booking-clinic-thumb\\'>🏥</div>'">`
      : `<div class="booking-clinic-thumb">🏥</div>`;
    const stars = h.rating ? `⭐ ${h.rating}` : "";
    const reviews = h.review_count ? ` · ${h.review_count}${t('hosp_reviews')}` : "";
    return `<div class="booking-clinic-card" data-nav="hospital" data-id="${h.id}">
      ${thumb}
      <div class="booking-clinic-info">
        <div class="booking-clinic-name">${h.name_ko}</div>
        <div class="booking-clinic-meta">${stars}${reviews}</div>
      </div>
      <div class="booking-clinic-arrow">›</div>
    </div>`;
  }).join("");
  return `<div style="padding:4px 0">${cards}</div>`;
}

function renderBooking(){
  const msgs = getBookingMsgs();
  const msgHtml = bookingMsgHtml(msgs);

   SEO UPDATER
   페이지 이동 시마다 title / meta / OG / JSON-LD / URL 갱신
   ════════════════════════════════════════ */
function updateSEO(){
  const lang = state.lang;
  const page = state.page;
  const id   = state.id;

  const siteName = {
    zh:"济州医美指南",
    en:"Jeju Medical Beauty Guide",
    ja:"済州島 医療美容ガイド"
  }[lang];

  let title  = siteName;
  let desc   = {
    zh:"济州岛皮肤科·整形外科医疗旅游指南。中文·英文·日文服务医院信息及评论摘要。",
    en:"Jeju dermatology & plastic surgery medical tourism guide. Clinic info with Chinese, English & Japanese support.",
    ja:"済州島の皮膚科・整形外科 医療観光ガイド。中国語・英語・日本語対応クリニック情報と口コミ要約。"
  }[lang];
  let url    = BASE_URL + "/";
  let ogType = "website";
  let ogImg  = BASE_URL + "/images/og-default.jpg";
  let locale = {zh:"zh_CN", en:"en_US", ja:"ja_JP"}[lang];
  let jsonLd = {"@context":"https://schema.org","@type":"WebSite","name":siteName,"url":BASE_URL+"/"};

  if(page === "hospitals"){
    title  = {zh:"济州医院列表 | "+siteName, en:"Jeju Clinics | "+siteName, ja:"済州クリニック一覧 | "+siteName}[lang];
    desc   = {
      zh:"济州岛皮肤科·整形外科全部医院列表。地区筛选、中文服务筛选、评分排序。",
      en:"Full list of dermatology and plastic surgery clinics in Jeju. Filter by region, Chinese service availability, and rating.",
      ja:"済州島の皮膚科・整形外科クリニック一覧。地域・中国語対応・評価でフィルタリング可能。"
    }[lang];
    url    = BASE_URL + "/?p=hospitals";
    jsonLd = {
      "@context":"https://schema.org","@type":"ItemList","name":title,"url":url,
      "itemListElement":DB.hospitals.map((h,i)=>({
        "@type":"ListItem","position":i+1,
        "url":BASE_URL+"/?p=hospital&id="+h.id,"name":h.name_ko
      }))
    };

  } else if(page === "hospital" && id){
    const h = DB.hospitals.find(x=>x.id===id);
    if(h){
      const hn = lng(h.name)||h.name_ko;
      const sp = (lng(h.specialties)||[]).join({zh:"·",en:", ",ja:"・"}[lang]);
      title  = h.name_ko + " | " + siteName;
      desc   = {
        zh:`${hn} — ${lng(h.address)}。主要项目：${sp}。综合评分 ${h.rating}（${h.review_count}条评论）`,
        en:`${hn} — ${lng(h.address)}. Specialties: ${sp}. Rating ${h.rating} (${h.review_count} reviews)`,
        ja:`${hn} — ${lng(h.address)}。専門メニュー：${sp}。評価 ${h.rating}（${h.review_count}件）`
      }[lang];
      url    = BASE_URL + "/?p=hospital&id=" + id;
      ogType = "business.business";
      if(h.thumbnail) ogImg = BASE_URL + "/" + h.thumbnail;
      jsonLd = {
        "@context":"https://schema.org","@type":"MedicalClinic",
        "name":h.name_ko,
        "alternateName":[h.name.zh,h.name.en,h.name.ja].filter(Boolean),
        "url":url,
        "telephone":h.phone,
        "address":{
          "@type":"PostalAddress",
          "streetAddress":h.address.en,
          "addressLocality":h.region==="jeju-city"?"Jeju City":"Seogwipo",
          "addressRegion":"Jeju","addressCountry":"KR"
        },
        "geo":{"@type":"GeoCoordinates","latitude":h.lat,"longitude":h.lng},
        "aggregateRating":{
          "@type":"AggregateRating","ratingValue":h.rating,
          "reviewCount":h.review_count,"bestRating":"5","worstRating":"1"
        },
        "medicalSpecialty":(Array.isArray(h.specialties)?h.specialties:(h.specialties?.en||[])).join(", ")
      };
    }

  } else if(page === "contents"){
    title  = {zh:"济州医美攻略 | "+siteName, en:"Medical Beauty Guides | "+siteName, ja:"医療美容ガイド記事 | "+siteName}[lang];
    desc   = {
      zh:"济州皮肤科·整形外科旅游攻略。选择医院的要点、提拉项目须知、评论平台比较等实用信息。",
      en:"Jeju medical beauty travel guides. Clinic selection tips, lifting treatment guides, Korean review platform comparisons.",
      ja:"済州の皮膚科・整形外科観光ガイド記事。クリニック選びのポイント・リフティングガイド・口コミ比較。"
    }[lang];
    url    = BASE_URL + "/?p=contents";
    jsonLd = {
      "@context":"https://schema.org","@type":"ItemList","name":title,"url":url,
      "itemListElement":DB.contents.map((c,i)=>({
        "@type":"ListItem","position":i+1,
        "url":BASE_URL+"/?p=post&id="+c.id,
        "name":(c.title[lang]||c.title.en)
      }))
    };

  } else if(page === "post" && id){
    const post = DB.contents.find(x=>x.id===id);
    if(post){
      const pt = lng(post.title);
      title  = pt + " | " + siteName;
      // HTML 태그 제거 후 plaintext excerpt 생성
      const rawBody = (lng(post.body)||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
      desc   = rawBody.substring(0,130) + "…";
      url    = BASE_URL + "/?p=post&id=" + id;
      ogType = "article";
      jsonLd = {
        "@context":"https://schema.org","@type":"Article",
        "headline":pt,"description":desc,
        "datePublished":post.published_at,
        "url":url,
        "inLanguage":lang==="zh"?"zh-CN":lang==="ja"?"ja":"en",
        "publisher":{"@type":"Organization","name":siteName,"url":BASE_URL+"/"},
        "mainEntityOfPage":{"@type":"WebPage","@id":url}
      };
    }
  }

  // ── DOM 업데이트 ──
  document.title = title;
  document.documentElement.lang = lang==="zh"?"zh-CN":lang==="ja"?"ja":"en";
  const s = (eid,val)=>{ const el=document.getElementById(eid); if(el) el.setAttribute("content",val); };
  const sh = (eid,val)=>{ const el=document.getElementById(eid); if(el) el.setAttribute("href",val); };
  document.getElementById("meta-desc")&&document.getElementById("meta-desc").setAttribute("content",desc);
  sh("meta-canonical", url);
  s("og-type",   ogType);
  s("og-title",  title);
  s("og-desc",   desc);
  s("og-url",    url);
  s("og-image",  ogImg);
  s("og-locale", locale);
  const ldEl = document.getElementById("ld-json");
  if(ldEl) ldEl.textContent = JSON.stringify(jsonLd);

  // ── hreflang 태그: 다국어 SEO ──
  document.querySelectorAll('link[rel="alternate"][hreflang]').forEach(el=>el.remove());
  if(window.location.protocol !== "file:"){
    const basePath = page==="home" ? "/" : ("/?p="+page+(id?"&id="+id:""));
    ["zh","en","ja"].forEach(lg=>{
      const link = document.createElement("link");
      link.rel = "alternate"; link.hreflang = lg==="zh"?"zh-CN":lg;
      link.href = BASE_URL + basePath + (basePath.includes("?")?"&":"?") + "lang="+lg;
      document.head.appendChild(link);
    });
  }

  // ── URL 히스토리 업데이트 (웹 호스팅 환경만) ──
  if(window.location.protocol !== "file:"){
    const desired = page==="home" ? "/" : ("/?p="+page+(id?"&id="+id:""));
    try{
      if(window.location.pathname+window.location.search !== desired)
        history.pushState({page,id,tab:state.tab,lang}, "", desired);
    }catch(e){}
  }
}

/* ── 병원 검색: named function + 디바운스로 중복 리스너·성능 문제 방지 ── */
let _hospSearchTimer = null;
function _onHospSearchInput(e){
  clearTimeout(_hospSearchTimer);
  _hospSearchTimer = setTimeout(()=>{
    state.hospSearch = e.target.value;
    const q = state.hospSearch.toLowerCase().trim();
    const r = state.hospRegion;
    const filtered = DB.hospitals.filter(h=>
      (r==="all"||h.region===r) &&
      (!state.hospChinese||h.chinese_staff) &&
      (!q||`${h.name_ko} ${lng(h.name)} ${lng(h.address)}`.toLowerCase().includes(q))
    );
    const listEl = document.getElementById("hospList");
    if(listEl){
      const countLabel = {zh:`共 ${filtered.length} 家`,en:`${filtered.length} found`,ja:`${filtered.length} 件`}[state.lang];
      listEl.innerHTML = filtered.length===0
        ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">${t('hosp_empty')}</div></div>`
        : (q?`<div style="font-size:12px;color:#9ca3af;margin-bottom:8px;padding-left:2px">${countLabel}</div>`:"")+filtered.map(h=>hospCardHtml(h)).join("");
    }
    // 검색어 있을 때 X 버튼 추가/제거
    const si = document.getElementById("hospSearch");
    const clr = document.getElementById("clearSearch");
    if(!clr && state.hospSearch && si){
      si.insertAdjacentHTML("afterend",`<button class="search-clear" id="clearSearch">✕</button>`);
      document.getElementById("clearSearch").addEventListener("click", _onClearSearch);
    } else if(clr && !state.hospSearch){ clr.remove(); }
  }, 300);
}
function _onClearSearch(){ state.hospSearch=""; render(); }

/* ── 키보드 접근성: Enter/Space로 카드 클릭 ── */
function _onViewKeydown(e){
  if(e.key==="Enter"||e.key===" "){
    const navEl = e.target.closest("[data-nav]");
    if(navEl){ e.preventDefault(); navEl.click(); }
  }
}

/* ── 뷰 클릭 핸들러: named function으로 분리해 중복 바인딩 방지 ── */
function _onViewClick(e){
    // Share button
    const shareEl = e.target.closest("[data-share]");
    if(shareEl){
      const h = DB.hospitals.find(x=>x.id===shareEl.dataset.share);
      if(h){
        const shareData = {title: h.name_ko, text: `${lng(h.name)} - ${lng(h.address)}`, url: window.location.href};
        if(navigator.share) navigator.share(shareData).catch(()=>{});
        else { navigator.clipboard&&navigator.clipboard.writeText(window.location.href); }
      }
      return;
    }

    // Favorite toggle — nav보다 먼저 체크해야 카드 이동 방지
    const favEl = e.target.closest("[data-fav]");
    if(favEl){ toggleFav(favEl.dataset.fav); return; }

    // Navigation
    const navEl = e.target.closest("[data-nav]");
    if(navEl){ navigate(navEl.dataset.nav, navEl.dataset.id||null); return; }

    // Back
    if(e.target.closest("[data-back]")){ goBack(); return; }

    // Chips (region / chinese / platform / specialty 필터)
    const chipEl = e.target.closest("[data-chip]");
    if(chipEl){
      const v = chipEl.dataset.chip;
      if(v.startsWith("region:"))   { state.hospRegion = v.replace("region:",""); render(); return; }
      if(v==="chinese:toggle")       { state.hospChinese = !state.hospChinese; render(); return; }
      if(v.startsWith("pf:"))        { state.activePlatform[state.id]=v.replace("pf:",""); render(); return; }
      if(v.startsWith("spec:"))      { state.hospSpecialty = v.replace("spec:",""); render(); return; }
    }

    // 홈 진료과목 그리드 클릭 → 병원 탭으로 이동 + specialty 필터 적용
    const specEl = e.target.closest("[data-spec]");
    if(specEl){
      state.hospSpecialty = specEl.dataset.spec;
      switchTab("hospitals");
      return;
    }

    // 인기시술 칩 클릭 → 병원 탭으로 이동 + specialty 필터 적용
    const procEl = e.target.closest("[data-proc]");
    if(procEl){
      state.hospSpecialty = procEl.dataset.procSpec;
      switchTab("hospitals");
      return;
    }

    // AI 안내 채팅: specialty 선택 버튼 → 병원 목록 즉시 표시
    const bookSpecEl = e.target.closest("[data-bookspec]");
    if(bookSpecEl){
      const specKey = bookSpecEl.dataset.bookspec;
      const specLabel = t('spec_'+specKey);
      state.bookData.spec = specKey;
      state.bookMsgs.push({role:"user", text: specLabel});
      state.bookMsgs.push({role:"ai", text: t('booking_confirm')});
      const ctaMsg = {
        zh:"👆 点击上方医院卡片可查看详细信息和联系方式。\n如需更换类别，请在下方输入任意内容。",
        en:"👆 Tap a clinic card above to view details & contact info.\nType anything below to search a different category.",
        ja:"👆 上のクリニックカードをタップすると詳細・連絡先が確認できます。\n別のカテゴリを探すには下に入力してください。"
      }[state.lang];
      state.bookMsgs.push({role:"ai", text: ctaMsg});
      state.bookStep = 2;
      state.bookFormVisible = true;
      render();
      setTimeout(()=>{ const cm=document.getElementById("chatMessages"); if(cm) cm.scrollTop=cm.scrollHeight; },50);
      return;
    }

    // Contact modal
    const contactEl = e.target.closest("[data-contact]");
    if(contactEl){
      const h = DB.hospitals.find(x=>x.id===contactEl.dataset.contact);
      if(h) showContactModal(h);
      return;
    }

    // Language change from Me page list items
    const langEl = e.target.closest("[data-lang]");
    if(langEl){ changeLang(langEl.dataset.lang); return; }

    // Location button → open sheet
    if(e.target.closest("#locBtn")){ showLocationSheet(); return; }

    // Bell button → notification sheet
    if(e.target.closest("#bellBtn")){ showBellSheet(); return; }

    // Menu button → settings drawer
    if(e.target.closest("#menuBtn")){ showSettingsDrawer(); return; }
}

function bindEvents(){
  const view = document.getElementById("view");

  // 기존 리스너 제거 후 재등록 → render() 반복 호출 시 중복 누적 방지
  view.removeEventListener("click", _onViewClick);
  view.addEventListener("click", _onViewClick);

  // 키보드 접근성: Enter/Space로 data-nav 카드 활성화
  view.removeEventListener("keydown", _onViewKeydown);
  view.addEventListener("keydown", _onViewKeydown);

  // 모달/시트 닫기는 각 show*() 함수 내부에 직접 바인딩됨 (아래 참조)

  // Hospital search — named function으로 분리하여 중복 리스너 방지
  const si = document.getElementById("hospSearch");
  if(si){
    // 이전 리스너 제거 후 재등록
    si.removeEventListener("input", _onHospSearchInput);
    si.addEventListener("input", _onHospSearchInput);
    si.focus(); si.setSelectionRange(si.value.length, si.value.length);
  }
  const clr = document.getElementById("clearSearch");
  if(clr){
    clr.removeEventListener("click", _onClearSearch);
    clr.addEventListener("click", _onClearSearch);
  }

  // AI 안내 채팅 인풋 전송
  function sendChatMsg(){
    const input = document.getElementById("chatInput");
    if(!input) return;
    const text = input.value.trim();
    if(!text) return;
    state.bookMsgs.push({role:"user", text});
    input.value="";
    if(state.bookData.spec){
      // 이미 시술을 선택한 경우 → 새 검색으로 리셋
      state.bookData = {}; state.bookFormVisible = false; state.bookStep = 0;
      const resetMsg = {
        zh:"好的，请重新选择您感兴趣的施术类别：",
        en:"Sure! Please select a treatment category:",
        ja:"了解です。施術カテゴリを再選択してください："
      }[state.lang];
      state.bookMsgs.push({role:"ai", text: resetMsg, type:"spec_select"});
    } else {
      // 시술 미선택 상태 → 버튼 선택 유도
      const guideMsg = {
        zh:"请使用下方的类别按钮选择施术项目。",
        en:"Please select a treatment category using the buttons below.",
        ja:"下のカテゴリボタンから施術を選んでください。"
      }[state.lang];
      state.bookMsgs.push({role:"ai", text: guideMsg, type:"spec_select"});
    }
    render();
    setTimeout(()=>{ const cm=document.getElementById("chatMessages"); if(cm) cm.scrollTop=cm.scrollHeight; },50);
  }
  const chatSend = document.getElementById("chatSendBtn");
  if(chatSend) chatSend.addEventListener("click", sendChatMsg);
  const chatInput = document.getElementById("chatInput");
  if(chatInput) chatInput.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); sendChatMsg(); } });

  // booking 탭 진입 시 채팅 맨 아래로
  if(state.page==="booking"){
    setTimeout(()=>{ const cm=document.getElementById("chatMessages"); if(cm) cm.scrollTop=cm.scrollHeight; },100);
  }
}

function showContactModal(h){
  const lang = state.lang;
  const c = h.contact||{};

  // 언어별 채널 구성
  const allChannels = [];
  if(c.wechat)    allChannels.push({type:"wechat",    id:c.wechat});
  if(c.line)      allChannels.push({type:"line",      id:c.line});
  if(c.instagram) allChannels.push({type:"instagram", id:c.instagram});

  if(!allChannels.length){
    const msg={zh:"该医院暂未提供线上联系方式，请拨打："+h.phone,en:"Online contact not yet available. Please call: "+h.phone,ja:"オンライン連絡先は準備中です。お電話："+h.phone}[lang];
    alert(msg); return;
  }

  const channelMeta = {
    wechat:    {icon:"💬", name:"WeChat",    color:"wechat",    sub:{zh:"中文快速响应",en:"Fast response in Mandarin",ja:"中国語対応"}},
    line:      {icon:"📱", name:"LINE",      color:"line",      sub:{zh:"LINE官方账号",en:"Official LINE Account",ja:"LINE公式アカウント"}},
    instagram: {icon:"📸", name:"Instagram", color:"instagram", sub:{zh:"Instagram DM",en:"Instagram DM",ja:"Instagram DM"}},
  };

  const copyLabel = {zh:"复制ID",en:"Copy ID",ja:"IDコピー"}[lang];
  const copiedLabel = {zh:"已复制",en:"Copied",ja:"コピー済"}[lang];
  const cancelLabel = {zh:"取消",en:"Cancel",ja:"キャンセル"}[lang];
  const subtitle = {zh:"选择偏好的联系方式",en:"Choose your preferred contact channel",ja:"ご希望の連絡方法を選択"}[lang];
  const noIntermediary = {zh:"⚠️ 本平台不参与中间咨询，请直接联系医院",en:"⚠️ We do not act as intermediaries. Contact the clinic directly.",ja:"⚠️ 仲介は行いません。クリニックへ直接ご連絡ください。"}[lang];

  const channelHtml = allChannels.map(ch=>{
    const m = channelMeta[ch.type];
    return `
    <div class="contact-channel-row">
      <div class="contact-channel-icon ${m.color}">${m.icon}</div>
      <div class="contact-channel-body">
        <div class="contact-channel-name">${m.name}</div>
        <div class="contact-channel-sub">${m.sub[lang]||m.sub.zh}</div>
        <div class="contact-id-row">
          <span class="contact-id-value">${ch.type==="instagram"?"@":""}${ch.id}</span>
          <button class="btn-copy-inline" data-copy="${ch.type==="instagram"?"@":""}${ch.id}" data-copied="${copiedLabel}" data-orig="${copyLabel}">${copyLabel}</button>
        </div>
      </div>
    </div>`;
  }).join("");

  const el = document.createElement("div");
  el.className = "modal-overlay";
  el.id = "contactModal";
  el.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:4px">${t('detail_contact')}</div>
      <div class="contact-subtitle">${subtitle}</div>
      ${channelHtml}
      <div class="contact-disclaimer">${noIntermediary}</div>
      <button class="btn-cancel-text" id="btnContactClose">${cancelLabel}</button>
    </div>`;
  document.body.appendChild(el);

  el.addEventListener("click", function(e){ if(e.target===el) closeContactModal(); });
  el.querySelector("#btnContactClose").addEventListener("click", closeContactModal);

  // Copy 버튼
  el.querySelectorAll("[data-copy]").forEach(btn=>{
    btn.addEventListener("click", function(){
      const text = this.dataset.copy;
      const orig = this.dataset.orig;
      const copied = this.dataset.copied;
      const done = ()=>{
        this.textContent = "✅ "+copied;
        this.classList.add("copied");
        setTimeout(()=>{ this.textContent=orig; this.classList.remove("copied"); },2000);
      };
      if(navigator.clipboard) navigator.clipboard.writeText(text).then(done).catch(()=>{ fallbackCopy(text); done(); });
      else { fallbackCopy(text); done(); }
    });
  });
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}
function closeContactModal(){
  const el = document.getElementById("contactModal");
  if(el) el.remove();
}

/* ════════════════════════════════════════
   GPS DETECTION
   ════════════════════════════════════════ */
function detectLocation(){
  if(!navigator.geolocation) return;
  // Show pulsing dot while detecting
  const locBtn = document.getElementById("locBtn");
  if(locBtn){
    const dot = document.createElement("span");
    dot.className = "loc-gps-dot";
    dot.id = "gpsDot";
    locBtn.appendChild(dot);
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      const {latitude:lat, longitude:lng} = pos.coords;
      // Verify within Jeju Island bounds
      if(lat>=33.1 && lat<=33.6 && lng>=126.1 && lng<=126.95){
        const region = lat >= 33.40 ? "jeju-city" : "seogwipo";
        if(state.location === "all"){   // Only auto-set if user hasn't chosen yet
          state.location = region;
          localStorage.setItem("location", region);
          localStorage.setItem("gps_ts", String(Date.now()));
          render();
          return;
        }
      }
      // Outside Jeju or already user-set — just remove the dot
      const dot2 = document.getElementById("gpsDot");
      if(dot2) dot2.remove();
    },
    function(){ // error / denied
      const dot3 = document.getElementById("gpsDot");
      if(dot3) dot3.remove();
    },
    {timeout:6000, maximumAge:300000}
  );
}

/* ════════════════════════════════════════
   INIT
   ════════════════════════════════════════ */
(function init(){
  // Restore language
  const savedLang = localStorage.getItem("lang");
  if(savedLang && ["zh","en","ja"].includes(savedLang)) state.lang = savedLang;

  // Restore location (if user previously selected manually)
  const savedLoc = localStorage.getItem("location");
  if(savedLoc && ["all","jeju-city","seogwipo"].includes(savedLoc)) state.location = savedLoc;

  // ── URL 파라미터 복원 (웹 호스팅 환경: 구글 인덱싱된 URL 직접 접근 시) ──
  if(window.location.protocol !== "file:"){
    const params = new URLSearchParams(window.location.search);
    const p  = params.get("p");
    const id = params.get("id");
    const urlLang = params.get("lang");
    // lang 파라미터가 있으면 우선 적용 (구글이 언어별 URL로 접근 시)
    if(urlLang && ["zh","en","ja"].includes(urlLang)) state.lang = urlLang;
    // 페이지 복원
    const validPages = ["home","hospitals","hospital","contents","post","me","booking","privacy"];
    if(p && validPages.includes(p)){
      state.page = p;
      state.tab  = (p==="hospitals"||p==="hospital") ? "hospitals"
                 : (p==="contents" ||p==="post")     ? "contents"
                 : (p==="me"||p==="privacy")         ? "me"
                 : (p==="booking")                   ? "booking" : "home";
    }
    if(id) state.id = id;
  }

  render();

  // ── 브라우저 뒤로/앞으로 버튼 처리 ──
  window.addEventListener("popstate", function(e){
    if(e.state){
      state.page = e.state.page || "home";
      state.id   = e.state.id   || null;
      state.tab  = e.state.tab  || "home";
      if(e.state.lang && ["zh","en","ja"].includes(e.state.lang)) state.lang = e.state.lang;
    } else {
      state.page = "home"; state.id = null; state.tab = "home";
    }
    window.scrollTo(0,0);
    render();
  });

  // Attempt GPS detection after first render (non-blocking, max once per 24h)
  const gpsTs = parseInt(localStorage.getItem("gps_ts")||"0",10);
  const gpsExpired = Date.now() - gpsTs > 86400000; // 24h
  if(!savedLoc && gpsExpired) setTimeout(detectLocation, 300);
})();
</script>
</body>
</html>
